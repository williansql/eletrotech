<header
    class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-md border-b border-white/10 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">

            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center gap-3 cursor-pointer" (click)="scrollTo('home')">
                <img class="w-10" src="/Logo.svg" alt="logo">
                <span class="font-display font-bold text-xl tracking-wide text-white">
                    Eletro<span class="text-[#fdbf51]">Par</span>
                </span>
            </div>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center gap-8">
                <button (click)="scrollTo('services')"
                    class="text-sm font-medium text-slate-300 hover:text-amber-400 transition-colors">
                    Serviços
                </button>
                <button (click)="scrollTo('calculators')"
                    class="text-sm font-medium text-amber-500 hover:text-amber-400 transition-colors">
                    Ferramentas
                </button>
                <button (click)="scrollTo('simulator')"
                    class="text-sm font-bold text-white bg-amber-500/20 border border-amber-500/50 px-4 py-2 rounded-full hover:bg-amber-500 hover:text-slate-900 transition-all shadow-[0_0_15px_rgba(245,158,11,0.15)]">
                    Simulador QDC
                </button>
                <button (click)="scrollTo('diagnosis')"
                    class="text-sm font-medium text-slate-300 hover:text-amber-400 transition-colors">
                    Diagnóstico
                </button>
            </nav>

            <!-- Mobile Menu Button (Optional, omitted for simplicity if not strictly needed, but let's add a simple one) -->
            <div class="md:hidden flex items-center">
                <button class="text-slate-300 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</header>
